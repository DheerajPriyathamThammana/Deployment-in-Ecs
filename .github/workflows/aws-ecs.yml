name: GHA-2-EKS-Helm

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  HELM_CHART_PATH: ./my-helm-chart # <-- CHANGE THIS to the path of your Helm chart folder

permissions:
  id-token: write
  contents: read

jobs:
  deploy-eks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate via AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::593845248500:role/Github-OIDC-EKS-Dheeraj
          aws-region: ${{ env.AWS_REGION }}

      # Step 1: Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 2: Build, tag, and push image to Amazon ECR
      - name: Build & Push to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # We export these separately to pass cleanly into Helm
          echo "registry_repo=$ECR_REGISTRY/$ECR_REPOSITORY" >> $GITHUB_OUTPUT
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Step 3: Configure Kubectl to connect to EKS
      - name: Update KubeConfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      # Step 4 & 5: Deploy with Helm and Wait for Stability
      - name: Deploy to Amazon EKS via Helm
        run: |
          helm upgrade --install ${{ secrets.HELM_RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
            --namespace default \
            --set image.repository=${{ steps.build-image.outputs.registry_repo }} \
            --set image.tag=${{ steps.build-image.outputs.tag }} \
            --atomic \
            --timeout 5m0s
