# Default values for my-helm-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of pods you want running in your EKS cluster
replicaCount: 2 # Increased to 2 for high availability across AWS Availability Zones

image:
  # LEAVE THESE PLACEDHOLDERS AS-IS. 
  # Your GitHub Actions pipeline will automatically overwrite these during runtime.
  repository: 593845248500.dkr.ecr.us-east-1.amazonaws.com/dheeraj-2025
  pullPolicy: IfNotPresent
  tag: "" 

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  # CHANGED: 'LoadBalancer' tells AWS EKS to automatically spin up a physical 
  # AWS Network/Classic Load Balancer so you can access your app from the public internet.
  type: LoadBalancer
  
  # The external port you want to use to visit your app (e.g., http://your-alb-url:80)
  port: 80
  
  # CRITICAL: Change this to match the internal port your application actually listens on!
  # For example: Node.js (3000), Python Flask (5000), Spring Boot (8080)
  targetPort: 80 

ingress:
  enabled: false # Kept false since we are using an AWS LoadBalancer service type instead.
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

httpRoute:
  enabled: false

resources:
  # Best practice: Protect your cluster by limiting what this app can consume
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# WARNING: If your application does NOT have a valid root "/" URL route that returns a 
# HTTP 200 status code, EKS will think your app is dead and constantly restart it.
livenessProbe:
  httpGet:
    path: / # Change to a valid health check endpoint if "/" doesn't exist
    port: 80
readinessProbe:
  httpGet:
    path: / # Change to a valid health check endpoint if "/" doesn't exist
    port: 80

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
